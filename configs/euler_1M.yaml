# configs/euler_1M.yaml
env: orientation
state_repr: euler
action_repr: euler
max_angle: 0.3141592653589793
threshold: 0.1
max_episode_steps: 50
dense_reward: true

total_timesteps: 10000000
learning_rate: 0.0003
anneal_lr: false
num_envs: 32
num_steps: 256
gamma: 0.99
gae_lambda: 0.95

num_minibatches: 4
update_epochs: 10
clip_coef: 0.2
clip_vloss: true
ent_coef: 0.0
vf_coef: 0.5
max_grad_norm: 0.5
target_kl: 0.04

hidden_dim: 256
num_layers: 2
seed: 42
save_every: 100