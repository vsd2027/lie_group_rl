# configs/lie_algebra_1M.yaml
# Usage: python ppo_lie_group.py --config configs/lie_algebra_1M.yaml

# Environment
env: orientation
state_repr: lie_algebra
action_repr: lie_algebra
max_angle: 0.3141592653589793  # 0.1π
threshold: 0.1
max_episode_steps: 50
dense_reward: true

# Training
total_timesteps: 10000000
learning_rate: 0.0003
anneal_lr: false
num_envs: 32
num_steps: 256
gamma: 0.99
gae_lambda: 0.95

# PPO
num_minibatches: 4
update_epochs: 10
clip_coef: 0.2
clip_vloss: true
ent_coef: 0.0
vf_coef: 0.5
max_grad_norm: 0.5
target_kl: 0.04

# Network
hidden_dim: 256
num_layers: 2

# Misc
seed: 42
save_every: 100