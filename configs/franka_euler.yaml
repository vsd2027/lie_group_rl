# configs/franka_euler.yaml
env: franka
state_repr: lie_algebra
action_repr: euler
max_angle: 0.3141592653589793
max_episode_steps: 100
threshold: 0.15
dense_reward: true
total_timesteps: 2000000
learning_rate: 0.0003
anneal_lr: false
num_envs: 4
num_steps: 512
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 10
clip_coef: 0.2
clip_vloss: true
ent_coef: 0.0
vf_coef: 0.5
max_grad_norm: 0.5
hidden_dim: 256
num_layers: 2
seed: 42
save_every: 100